<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orchis Secure Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Roboto:wght@300;400;700;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

  :root {
    --bg-main: #0d0d0d;
    --bg-panel: #1a1a1a;
    --primary-red: #8b0000;
    --accent-red: #d32f2f;
    --text-main: #f5f5f5;
    --text-muted: #888888;
    --border-color: #2a2a2a;
    --font-serif: 'Playfair Display', serif;
    --font-sans: 'Roboto', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background-color: #000; font-family: var(--font-sans);
    color: var(--text-main); display: flex; justify-content: center; overflow: hidden;
  }
  ::-webkit-scrollbar { display: none; }

  .app-container {
    width: 100%; max-width: 480px; background-color: var(--bg-main);
    height: 100vh; position: relative; box-shadow: 0 0 50px rgba(139, 0, 0, 0.1);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .main-header {
    padding: 20px 20px 15px; background: rgba(13, 13, 13, 0.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color); position: relative; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header-title h1 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .header-subtitle { font-size: 0.75rem; color: var(--primary-red); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .header-actions { display: flex; gap: 15px; }
  .action-icon { font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
  .action-icon:active { transform: scale(0.8); }

  .inbox-list { flex-grow: 1; overflow-y: auto; padding-top: 10px; padding-bottom: 40px; }
  .inbox-item { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid rgba(255, 255, 255, 0.03); position: relative; }
  .inbox-item:active { background: rgba(255,255,255,0.05); }

  .avatar-container { position: relative; width: 54px; height: 54px; margin-right: 15px; }
  .avatar-ring { position: absolute; inset: 0; border-radius: 50%; background: linear-gradient(45deg, #333, #666); padding: 2px; }
  .inbox-item.unread .avatar-ring { background: linear-gradient(45deg, var(--primary-red), #ff5252); animation: spin 4s linear infinite; }
  .avatar-img { width: 100%; height: 100%; background-color: var(--bg-panel); border-radius: 50%; border: 2px solid var(--bg-main); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; position: relative; z-index: 2; }
  
  .avatar-blair { background: radial-gradient(circle, #2a0808, #110000); }
  .avatar-henry { background: radial-gradient(circle, #080b2a, #000211); }
  .avatar-luca  { background: radial-gradient(circle, #2a1108, #110300); }
  .avatar-albert{ background: radial-gradient(circle, #1a1a1a, #000000); }
  .avatar-daniel{ background: radial-gradient(circle, #15082a, #050011); }

  .item-content { flex-grow: 1; overflow: hidden; }
  .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .item-name { font-weight: 700; font-size: 1rem; color: #fff; }
  .item-time { font-size: 0.75rem; color: var(--text-muted); }
  .inbox-item.unread .item-time { color: var(--accent-red); font-weight: 700; }
  .item-preview { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inbox-item.unread .item-preview { color: #ddd; font-weight: 700; }
  .unread-badge { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: var(--accent-red); color: #fff; font-size: 0.7rem; font-weight: 900; min-width: 20px; height: 20px; border-radius: 10px; display: flex; justify-content: center; align-items: center; padding: 0 6px; box-shadow: 0 0 10px rgba(211,47,47,0.5); }

  @keyframes spin { 100% { transform: rotate(360deg); } }

  .chat-screen { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg-main); z-index: 200; display: flex; flex-direction: column; transition: left 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .chat-screen.active { left: 0; }
  
  .chat-header { display: flex; align-items: center; padding: 15px 20px; background: rgba(13, 13, 13, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
  .back-btn { font-size: 1.6rem; color: var(--text-muted); cursor: pointer; margin-right: 15px; transition: color 0.2s; }
  .back-btn:active { color: #fff; }
  .chat-header-info { flex-grow: 1; display: flex; align-items: center; }
  .chat-header-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-panel); display: flex; justify-content: center; align-items: center; margin-right: 12px; font-size: 1rem; border: 1px solid #333; }
  .chat-header-name { font-weight: 700; font-size: 1.05rem; color: #fff; letter-spacing: -0.2px; }
  .chat-header-status { font-size: 0.7rem; color: var(--accent-red); margin-top: 2px; font-weight: 700; }

  .chat-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: var(--bg-main); background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 15px 15px; }
  .chat-area::-webkit-scrollbar { display: none; }

  .msg-bubble { max-width: 82%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-break: keep-all; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  .msg-received { align-self: flex-start; background: var(--bg-panel); color: #fff; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
  .msg-sent { align-self: flex-end; background: var(--primary-red); color: #fff; border-bottom-right-radius: 4px; }
  .msg-trans { display: block; font-family: 'Nanum Pen Script', cursive; font-size: 1.3rem; margin-top: 6px; letter-spacing: 0.5px; opacity: 0.9; }
  .msg-received .msg-trans { color: var(--accent-red); }
  .msg-sent .msg-trans { color: #ffcdd2; }

  .typing-indicator { display: none; align-self: flex-start; background: var(--bg-panel); padding: 12px 18px; border-radius: 18px; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); margin-bottom: 10px; }
  .dot { display: inline-block; width: 6px; height: 6px; background: #666; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

  .choices-area { padding: 15px 20px 25px; background: var(--bg-main); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
  .choice-btn { width: 100%; padding: 14px 18px; background: transparent; border: 1px solid #444; color: var(--text-main); border-radius: 12px; font-family: var(--font-sans); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: left; line-height: 1.3; }
  .choice-btn:active { background: rgba(255,255,255,0.05); border-color: #888; }
  .choice-trans { display: block; font-family: 'Nanum Pen Script', cursive; font-size: 1.15rem; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

  .gossip-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(139, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; }
  .gossip-alert-overlay.active { display: flex; animation: alertFlash 0.15s 3; }
  .gossip-alert-box { background: #000; width: 85%; max-width: 340px; padding: 25px 20px; border: 2px solid var(--accent-red); box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); position: relative; overflow: hidden; }
  .gossip-alert-box::before { content: 'CONFIDENTIAL'; position: absolute; top: 10px; right: -25px; background: var(--accent-red); color: #fff; font-size: 0.6rem; font-weight: 900; padding: 2px 30px; transform: rotate(45deg); }
  .alert-header { font-family: var(--font-serif); font-size: 1.5rem; color: var(--accent-red); font-weight: 900; margin-bottom: 15px; text-transform: uppercase; animation: glitchText 2s infinite; }
  .alert-body { font-size: 0.95rem; color: #fff; line-height: 1.5; margin-bottom: 20px; font-weight: 300; }
  .alert-body strong { color: var(--accent-red); font-weight: 700; }
  .alert-close-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
  .alert-close-btn:active { background: var(--accent-red); color: #000; }

  @keyframes alertFlash { 0% { background: rgba(255,0,0,0.8); } 50% { background: transparent; } 100% { background: rgba(139,0,0,0.6); } }
  @keyframes glitchText { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 1px); } 40% { transform: translate(2px, -1px); } }
</style>
</head>

          { eng: "You're a psycho.", kor: "너 진짜 사이코구나.", next: 'daniel_end' }
        ]
      },
      daniel_stare_look: {
        msgs: [
          { type: 'received', eng: "Everything.", kor: "전부 다." },
          { type: 'received', eng: "I'm trying to figure out why Luca and Henry are so obsessed with you.", kor: "루카랑 헨리가 왜 그렇게 너한테 집착하는지 분석 중이거든." },
          { type: 'received', eng: "...And I think I'm starting to understand.", kor: "...그리고 이제 조금 알 것 같아." }
        ],
        choices: [
          { eng: "Understand what?", kor: "뭘 알았다는 건데?", next: 'daniel_stare_understand' }
        ]
      },
      daniel_stare_understand: {
        msgs: [
          { type: 'received', eng: "That I might want to ruin you myself.", kor: "나도 널 망가뜨려 보고 싶어졌다는 거." }
        ],
        choices: [{ eng: "...", kor: "...", next: 'daniel_end' }]
      },
      daniel_music: {
        msgs: [
          { type: 'received', eng: "...", kor: "..." },
          { type: 'received', eng: "Where did you see that.", kor: "그거 어디서 봤어." },
          { type: 'received', eng: "Erase it from your memory. Right now.", kor: "당장 네 기억 속에서 지워." }
        ],
        choices: [
          { eng: "It was actually pretty good.", kor: "사실 그 곡, 꽤 좋았어.", next: 'daniel_music_praise' },
          { eng: "Make me.", kor: "지우게 만들어 보든가.", next: 'daniel_music_threat' }
        ]
      },
      daniel_music_praise: {
        msgs: [
          { type: 'received', eng: "Don't pretend you understand my music.", kor: "네가 내 음악을 이해하는 척하지 마." },
          { type: 'received', eng: "But... stay right there. Don't move.", kor: "하지만... 거기 가만히 있어. 움직이지 마." }
        ],
        choices: [
          { eng: "Why? Are you coming?", kor: "왜? 오게?", next: 'daniel_music_coming' }
        ]
      },
      daniel_music_coming: {
        msgs: [
          { type: 'received', eng: "I need to look at your face. To see if you're lying.", kor: "네 얼굴을 봐야겠어. 거짓말하는지 아닌지." }
        ],
        choices: [{ eng: "...", kor: "...", next: 'daniel_end' }]
      },
      daniel_music_threat: {
        msgs: [
          { type: 'received', eng: "You have a death wish, don't you?", kor: "너 진짜 죽고 싶은가 보네." },
          { type: 'received', eng: "I'm coming to the locker room. I'll silence you myself.", kor: "지금 락커룸으로 갈게. 내 손으로 네 입을 막아주지." }
        ],
        choices: [
          { eng: "I'll be waiting.", kor: "기다릴게.", next: 'daniel_music_waiting' }
        ]
      },
      daniel_music_waiting: {
        msgs: [
          { type: 'received', eng: "You better be.", kor: "기다리는 게 좋을 거야." }
        ],
        choices: [{ eng: "...", kor: "...", next: 'daniel_end' }]
      },
      daniel_end: { msgs: [], choices: [] }
    }
  }

}; // chatData 끝

  // DOM Elements
  const inboxList = document.getElementById('inboxList');
  const chatScreen = document.getElementById('chatScreen');
  const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
  const chatHeaderName = document.getElementById('chatHeaderName');
  const chatArea = document.getElementById('chatArea');
  const typingIndicator = document.getElementById('typingIndicator');
  const choicesArea = document.getElementById('choicesArea');
  const gossipAlert = document.getElementById('gossipAlert');
  const alertBodyText = document.getElementById('alertBodyText');

  let currentChatId = null;

  function initInbox() {
    inboxList.innerHTML = '';
    for (const key in chatData) {
      const data = chatData[key];
      const item = document.createElement('div');
      item.className = 'inbox-item ' + (data.unread ? 'unread' : '');
      item.onclick = () => openChat(key);
      item.innerHTML = `
        <div class="avatar-container">
          <div class="avatar-ring"></div>
          <div class="avatar-img ${data.theme}">${data.avatar}</div>
        </div>
        <div class="item-content">
          <div class="item-top"><div class="item-name">${data.name}</div><div class="item-time">${data.time}</div></div>
          <div class="item-preview">${data.preview}</div>
        </div>
        ${data.unread ? '<div class="unread-badge">!</div>' : ''}
      `;
      inboxList.appendChild(item);
    }
  }

  function openChat(id) {
    currentChatId = id;
    chatData[id].unread = false;
    initInbox();
    chatHeaderAvatar.innerText = chatData[id].avatar;
    chatHeaderAvatar.className = `chat-header-avatar ${chatData[id].theme}`;
    chatHeaderName.innerText = chatData[id].name;
    document.querySelector('.chat-header-status').innerText = chatData[id].status;
    chatScreen.classList.add('active');
    renderChatHistory(id);
  }

  function closeChat() {
    chatScreen.classList.remove('active');
    currentChatId = null;
    initInbox();
  }

  function renderChatHistory(id) {
    const data = chatData[id];
    if (!data.history) data.history = [...data.nodes[data.currentNode].msgs];

    chatArea.innerHTML = '';
    chatArea.appendChild(typingIndicator);

    data.history.forEach(msg => appendMsgToDOM(msg));

    renderChoices(id);
    setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
  }

  function appendMsgToDOM(msg) {
    const div = document.createElement('div');
    div.className = `msg-bubble msg-${msg.type}`;
    div.innerHTML = `${msg.eng}<span class="msg-trans">(${msg.kor})</span>`;
    chatArea.insertBefore(div, typingIndicator);
  }

  function renderChoices(id) {
    choicesArea.innerHTML = '';
    const node = chatData[id].nodes[chatData[id].currentNode];

    if (!node.choices || node.choices.length === 0) {
      choicesArea.innerHTML = '<div style="text-align:center; color:#666; font-size:0.85rem; padding: 10px;">[ 대화가 종료되었습니다 ]</div>';
      setTimeout(() => triggerAlert(id), 1500);
      return;
    }

    node.choices.forEach((choice) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `${choice.eng}<span class="choice-trans">${choice.kor}</span>`;
      btn.onclick = () => handleChoiceSelect(id, choice);
      choicesArea.appendChild(btn);
    });
  }

  function handleChoiceSelect(id, choice) {
    const data = chatData[id];
    const userMsg = { type: 'sent', eng: choice.eng, kor: choice.kor };
    data.history.push(userMsg);
    appendMsgToDOM(userMsg);

    data.preview = choice.kor;
    data.time = 'Just now';
    choicesArea.innerHTML = '';
    typingIndicator.style.display = 'block';
    chatArea.scrollTop = chatArea.scrollHeight;
    data.currentNode = choice.next;
    const nextNode = data.nodes[data.currentNode];

    setTimeout(() => {
      typingIndicator.style.display = 'none';
      if (nextNode && nextNode.msgs) {
        nextNode.msgs.forEach(msg => {
          data.history.push(msg);
          appendMsgToDOM(msg);
          data.preview = msg.kor;
        });
      }
      renderChoices(id);
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 1200 + Math.random() * 500);
  }

  function triggerAlert(id) {
    let msg = "";
    switch(id) {
      case 'luca': msg = "루카 락커룸 앞에서 누군가 질질 끌려가는 소리가 들렸다던데. <strong>새 장난감이 완전히 망가진 걸까?</strong>"; break;
      case 'henry': msg = "헨리가 기숙사에서 미친 듯이 뛰쳐나갔대. <strong>타겟을 보호하려는 걸까, 사냥하러 가는 걸까?</strong>"; break;
      case 'blair': msg = "블레어가 심하게 빡쳤어. <strong>누군가의 인생이 실시간으로 박살 나는 걸</strong> 볼 수 있겠네."; break;
      case 'albert': msg = "학생회실 문이 안에서 잠겼대. <strong>알버트의 체스판에서 또 한 명의 말이 먹혔나 봐.</strong>"; break;
      case 'daniel': msg = "항상 자고 있던 다니엘이 누군가의 뒤를 밟기 시작했대. <strong>표적이 된 걸 축하해.</strong>"; break;
    }
    alertBodyText.innerHTML = msg;
    gossipAlert.classList.add('active');
  }

  function closeAlert() { gossipAlert.classList.remove('active'); }

  window.onload = initInbox;
</script>
</body>
</html>
